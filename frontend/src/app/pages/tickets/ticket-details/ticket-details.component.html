<div *ngIf="ticket" class="max-w-4xl mx-auto p-6 bg-white shadow-lg rounded-lg mt-10">
  <div class="border-b pb-4 mb-6 flex justify-between items-center">
    <div>
      <h1 class="text-3xl font-bold text-gray-800">{{ ticket.title }}</h1>
      <p class="text-sm text-gray-500 mt-1">Ref ID: #{{ ticket.id }}</p>
    </div>
    <span [ngClass]="{
      'bg-yellow-100 text-yellow-800': ticket.status === 'OPEN',
      'bg-blue-100 text-blue-800': ticket.status === 'IN_PROGRESS',
      'bg-green-100 text-green-800': ticket.status === 'CLOSED'
    }" class="px-4 py-2 rounded-full font-bold text-sm uppercase">
      {{ ticket.status }}
    </span>
  </div>

  <div class="space-y-6">
    <div>
      <label class="text-sm font-semibold text-gray-700 uppercase">Description</label>
      <div class="mt-1 p-4 bg-gray-50 border rounded-md text-gray-600 min-h-[100px]">
        {{ ticket.description }}
      </div>
    </div>
  </div>

  <div *ngIf="authService.isAdmin() && ticket.status !== 'CLOSED'" class="mt-8 p-6 bg-white border-2 border-teal-100 rounded-2xl shadow-sm">
    <h3 class="text-lg font-bold text-gray-800 mb-4">Update Progress</h3>

    <div class="grid grid-cols-1 gap-4">
      <label class="text-xs font-bold text-gray-500 uppercase">Current Status</label>
      <select [(ngModel)]="statusToUpdate" class="p-3 border rounded-xl outline-none focus:border-teal-500">
        <option value="OPEN">Open</option>
        <option value="IN_PROGRESS">In Progress</option>
        <option value="CLOSED">Closed (Resolve)</option>
      </select>

      <div *ngIf="statusToUpdate === 'CLOSED'" class="space-y-4 mt-2 p-4 bg-teal-50 rounded-xl border border-teal-100">
        <div>
          <label class="block text-xs font-bold text-teal-700 uppercase mb-1">Resolution Reason</label>
          <select [(ngModel)]="resolutionType" class="w-full p-2 border rounded-lg">
            <option value="FIXED">Issue Fixed</option>
            <option value="DUPLICATE">Duplicate Ticket</option>
            <option value="NOT_REPRODUCIBLE">Not Reproducible</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-teal-700 uppercase mb-1">Solution Details</label>
          <textarea [(ngModel)]="solutionText" rows="3" class="w-full p-2 border rounded-lg" placeholder="Explain how it was solved..."></textarea>
        </div>
      </div>

      <button (click)="submitUpdate()" class="bg-teal-600 text-white font-bold py-3 rounded-xl hover:bg-teal-700 transition">
        CONFIRM UPDATE
      </button>
    </div>
  </div>

  <div *ngIf="ticket.status === 'CLOSED'" class="mt-8 p-6 bg-green-50 border border-green-200 rounded-2xl">
    <h3 class="text-green-800 font-bold mb-2 uppercase text-sm text-center">Ticket Resolved</h3>
    <div class="space-y-2">
      <p class="text-green-900 font-bold italic">Reason: {{ ticket.resolutionType }}</p>
      <p class="text-green-700 leading-relaxed">{{ ticket.solution || 'The issue was resolved by the support team.' }}</p>
    </div>
  </div>

  <div class="mt-8 pt-4 border-t">
    <button routerLink="/tickets/list" class="text-gray-500 hover:text-teal-600 flex items-center">
      <i class="pi pi-arrow-left mr-2"></i> Back to List
    </button>
  </div>
</div>
