<div class="max-w-2xl mx-auto p-6 bg-white shadow-lg rounded-lg mt-10">
  <h2 class="text-2xl font-bold text-gray-800 mb-6">Create New Ticket</h2>
  
  <form [formGroup]="ticketForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label class="block text-sm font-semibold text-gray-700">Subject</label>
      <input 
        formControlName="title" 
        type="text" 
        class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
        placeholder="Briefly describe the issue">
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700">Description</label>
      <textarea 
        formControlName="description" 
        rows="5" 
        class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
        placeholder="Provide all necessary details..."></textarea>
    </div>

    <div class="flex justify-end space-x-3">
      <button 
        type="button" 
        (click)="ticketForm.reset()"
        class="px-4 py-2 text-gray-600 bg-gray-100 rounded-md hover:bg-gray-200">
        Clear
      </button>
      <button 
        type="submit" 
        [disabled]="ticketForm.invalid"
        class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:bg-gray-400">
        Submit Ticket
      </button>
    </div>
  </form>
</div>
