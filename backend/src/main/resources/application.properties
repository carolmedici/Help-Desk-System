spring.application.name=helpdesk
spring.profiles.active=dev
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5433/keycloak
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/helpdesk-realm

# Ajustes de estabilidade para o Pool
spring.datasource.hikari.max-lifetime=540000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000

# Testa a conexao antes de usar
spring.datasource.hikari.connection-test-query=SELECT 1